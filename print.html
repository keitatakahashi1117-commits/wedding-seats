<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>席次表（印刷用） — 髙橋慶太 &amp; 菊地晴香</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #1A2B4A;
      --gold: #C9A96E;
      --gold-light: #E2C99A;
      --text: #2A1F15;
      --text-light: #6B5744;
      --border: #D6C8B8;
      --bg: #FDFAF6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Serif JP', serif;
      background: var(--bg);
      color: var(--text);
      font-size: 11px;
    }

    /* ── Screen: print button ── */
    .screen-only {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .btn-print {
      padding: 10px 28px;
      background: var(--navy);
      color: white;
      border: none;
      cursor: pointer;
      font-family: 'Noto Serif JP', serif;
      font-size: 13px;
      letter-spacing: 0.1em;
      transition: opacity 0.2s;
    }
    .btn-print:hover { opacity: 0.85; }
    .btn-back {
      padding: 10px 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-light);
      font-family: 'Noto Serif JP', serif;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn-back:hover { background: #f0ebe4; }

    /* ── Page wrapper ── */
    .page {
      width: 297mm;
      height: 210mm;
      margin: 16px auto;
      background: white;
      padding: 10mm 12mm 8mm;
      box-shadow: 0 2px 20px rgba(0,0,0,0.12);
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Corner decorations */
    .page::before,
    .page::after {
      content: '';
      position: absolute;
      width: 22mm;
      height: 22mm;
      border-color: var(--gold-light);
      border-style: solid;
      pointer-events: none;
    }
    .page::before { top: 5mm; left: 5mm; border-width: 0.5px 0 0 0.5px; }
    .page::after  { bottom: 5mm; right: 5mm; border-width: 0 0.5px 0.5px 0; }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 3mm;
      margin-bottom: 3mm;
      border-bottom: 0.5px solid var(--gold-light);
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .header-eyebrow {
      font-family: 'Cormorant Garamond', serif;
      font-size: 7px;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-transform: uppercase;
    }

    .header-names {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 400;
      color: var(--navy);
      letter-spacing: 0.05em;
      line-height: 1.1;
    }
    .header-amp {
      font-style: italic;
      color: var(--gold);
      margin: 0 4px;
    }

    .header-right {
      text-align: right;
      line-height: 1.7;
      color: var(--text-light);
      font-size: 9px;
      letter-spacing: 0.05em;
    }
    .header-right-date {
      font-family: 'Cormorant Garamond', serif;
      font-size: 12px;
      color: var(--navy);
      letter-spacing: 0.1em;
    }

    /* ── Floor plan layout ── */
    .floor {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2.5mm;
      overflow: hidden;
    }

    /* Rows */
    .row {
      display: flex;
      justify-content: center;
      gap: 3mm;
      flex: 1;
    }

    .row-spread {
      display: flex;
      justify-content: space-between;
      gap: 3mm;
      flex: 1;
    }

    /* Individual table box */
    .tbl {
      border: 0.5px solid var(--border);
      background: white;
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    .tbl-main {
      flex: 0 0 auto;
      width: 38mm;
      border-color: var(--navy);
      background: linear-gradient(135deg, #f5f8ff 0%, white 100%);
    }

    .tbl-header {
      background: var(--navy);
      color: white;
      text-align: center;
      padding: 2px 4px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 10px;
      letter-spacing: 0.08em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .tbl-group {
      text-align: center;
      font-size: 7px;
      color: var(--gold);
      letter-spacing: 0.05em;
      padding: 1px 4px;
      border-bottom: 0.5px solid var(--border);
      background: rgba(201,169,110,0.05);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 0;
    }

    .tbl-guests {
      list-style: none;
      padding: 2px 5px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-evenly;
    }

    .tbl-guest {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 1px 0;
      border-bottom: 0.3px solid #EDE8E0;
      gap: 3px;
    }
    .tbl-guest:last-child { border-bottom: none; }

    .tbl-guest-name {
      font-size: 9.5px;
      font-weight: 500;
      color: var(--navy);
      white-space: nowrap;
      letter-spacing: 0.02em;
    }
    .tbl-guest-sama {
      font-size: 8px;
      color: var(--text-light);
      font-weight: 300;
    }
    .tbl-guest-kana {
      font-size: 7px;
      color: var(--text-light);
      flex: 1;
      text-align: right;
      white-space: nowrap;
    }

    /* ── Footer ── */
    .footer {
      flex-shrink: 0;
      margin-top: 2.5mm;
      padding-top: 2mm;
      border-top: 0.5px solid var(--gold-light);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 8px;
      letter-spacing: 0.2em;
      color: var(--text-light);
    }
    .footer-note {
      font-size: 7px;
      color: var(--text-light);
      letter-spacing: 0.05em;
    }

    /* ── Print ── */
    @media print {
      @page {
        size: A4 landscape;
        margin: 0;
      }
      body { background: white; }
      .screen-only { display: none !important; }
      .page {
        margin: 0;
        box-shadow: none;
        height: 210mm;
        width: 297mm;
      }
    }

    /* ── Screen preview ── */
    @media screen {
      body { background: #e8e4de; }
    }
  </style>
</head>
<body>

  <div class="screen-only">
    <button class="btn-print" onclick="window.print()">印刷 / PDF で保存（横向き A4）</button>
    <a href="seating.html" class="btn-back">← 席次表に戻る</a>
  </div>

  <div class="page">

    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <span class="header-eyebrow">Wedding Reception &nbsp;·&nbsp; 席次表</span>
        <div class="header-names">
          髙橋 慶太<span class="header-amp">&amp;</span>菊地 晴香
        </div>
      </div>
      <div class="header-right">
        <div class="header-right-date">2026年4月26日（日）</div>
        <div>挙式 10:30 &nbsp;|&nbsp; 披露宴 11:15</div>
        <div>カトルセゾンガーデン（さいたま）</div>
      </div>
    </div>

    <!-- Floor plan -->
    <div class="floor" id="floorPlan">
      <div class="row" id="rowMain"></div>
      <div class="row" id="row1"></div>
      <div class="row" id="row2"></div>
      <div class="row-spread" id="row3"></div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <span class="footer-text">髙橋慶太 &amp; 菊地晴香 &nbsp;·&nbsp; 2026.04.26 &nbsp;·&nbsp; カトルセゾンガーデン</span>
      <span class="footer-note">※敬称略</span>
    </div>
  </div>

  <script src="data.js"></script>
  <script>
    // Table → row mapping
    const rows = {
      main:  'rowMain',
      '03':  'row1',
      '04':  'row1',
      '05':  'row1',
      '06':  'row1',
      '08':  'row2',
      '09':  'row2',
      '10':  'row2',
      '12':  'row3',
      '15':  'row3',
    };

    function buildTable(table) {
      const isMain = table.id === 'main';
      const div = document.createElement('div');
      div.className = 'tbl' + (isMain ? ' tbl-main' : '');

      const guestRows = table.guests.map(g => `
        <li class="tbl-guest">
          <span class="tbl-guest-name">${g.name}${g.noSama ? '' : '<span class="tbl-guest-sama"> 様</span>'}</span>
          <span class="tbl-guest-kana">${g.kana}</span>
        </li>
      `).join('');

      div.innerHTML = `
        <div class="tbl-header">${table.label}</div>
        ${table.group ? `<div class="tbl-group">${table.group}</div>` : ''}
        <ul class="tbl-guests">${guestRows}</ul>
      `;
      return div;
    }

    // For row3, spacer between table 12 and 15
    TABLES.forEach(table => {
      const rowId = rows[table.id];
      if (!rowId) return;
      const rowEl = document.getElementById(rowId);
      rowEl.appendChild(buildTable(table));
    });
  </script>
</body>
</html>

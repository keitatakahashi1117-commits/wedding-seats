<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>席次表 — 髙橋慶太 &amp; 菊地晴香</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Page layout ── */
    body {
      background:
        radial-gradient(ellipse at 10% 0%, rgba(212,165,165,0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 100%, rgba(201,169,110,0.08) 0%, transparent 50%),
        var(--ivory);
    }

    /* ── Header / Hero ── */
    .hero {
      text-align: center;
      padding: 56px 24px 40px;
      position: relative;
    }

    .hero-eyebrow {
      font-family: 'Cormorant Garamond', serif;
      font-size: 12px;
      letter-spacing: 0.35em;
      color: var(--gold);
      text-transform: uppercase;
      animation: fadeUp 0.6s ease both;
    }

    .hero-names {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(32px, 8vw, 52px);
      font-weight: 400;
      color: var(--navy);
      line-height: 1.15;
      margin: 16px 0 8px;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .hero-amp {
      font-style: italic;
      color: var(--gold);
      font-size: 0.85em;
    }

    .hero-meta {
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      letter-spacing: 0.15em;
      color: var(--text-light);
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .hero-venue {
      font-size: 13px;
      color: var(--text-light);
      margin-top: 4px;
      letter-spacing: 0.05em;
      animation: fadeUp 0.6s 0.25s ease both;
    }

    .hero-divider {
      animation: fadeUp 0.6s 0.3s ease both;
    }

    /* ── Sticky search ── */
    .search-sticky {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,249,240,0.96);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(201,169,110,0.2);
      padding: 12px 16px;
      animation: fadeIn 0.6s 0.4s ease both;
    }

    .search-inner {
      max-width: 600px;
      margin: 0 auto;
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 12px 44px 12px 16px;
      border: 1px solid rgba(201,169,110,0.4);
      background: var(--white);
      font-family: 'Noto Serif JP', serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
      border-radius: 2px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .search-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,169,110,0.12);
    }
    .search-input::placeholder {
      color: var(--text-light);
      opacity: 0.6;
    }

    .search-clear {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-light);
      font-size: 18px;
      line-height: 1;
      display: none;
      padding: 4px;
    }

    .search-result-info {
      text-align: center;
      font-size: 12px;
      color: var(--gold-dark);
      margin-top: 6px;
      min-height: 18px;
      letter-spacing: 0.05em;
    }

    /* ── Main content ── */
    .main-content {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 16px 64px;
    }

    /* ── Section headings ── */
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 400;
      color: var(--navy);
      letter-spacing: 0.1em;
      margin-bottom: 20px;
      text-align: center;
    }

    /* ── Floor plan ── */
    .floor-plan-section {
      margin-bottom: 48px;
      animation: fadeUp 0.7s 0.5s ease both;
    }

    .floor-plan-card {
      background: var(--white);
      border: 1px solid rgba(201,169,110,0.25);
      box-shadow: var(--shadow);
      padding: 28px 20px;
      overflow-x: auto;
    }

    .floor-plan {
      min-width: 300px;
      max-width: 560px;
      margin: 0 auto;
    }

    /* Stage / front */
    .fp-stage {
      text-align: center;
      margin-bottom: 12px;
    }
    .fp-stage-label {
      display: inline-block;
      padding: 6px 32px;
      border: 1px solid var(--gold-light);
      font-family: 'Cormorant Garamond', serif;
      font-size: 12px;
      letter-spacing: 0.25em;
      color: var(--gold-dark);
      background: linear-gradient(135deg, rgba(201,169,110,0.08), rgba(201,169,110,0.02));
    }

    /* Main table */
    .fp-main-row {
      display: flex;
      justify-content: center;
      margin-bottom: 10px;
    }

    .fp-table {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 1px solid rgba(201,169,110,0.4);
      background: var(--white);
      transition: all 0.25s ease;
      padding: 10px 14px;
      min-width: 64px;
      text-decoration: none;
      user-select: none;
    }
    .fp-table:hover {
      background: var(--gold);
      border-color: var(--gold);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(201,169,110,0.3);
    }
    .fp-table:hover .fp-table-num,
    .fp-table:hover .fp-table-count {
      color: var(--white);
    }
    .fp-table-main {
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
      border-color: var(--navy);
      padding: 12px 20px;
      min-width: 100px;
    }
    .fp-table-main .fp-table-num,
    .fp-table-main .fp-table-count {
      color: var(--white);
    }
    .fp-table-main:hover {
      background: linear-gradient(135deg, var(--navy-light), var(--navy));
    }

    .fp-table-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      font-weight: 500;
      color: var(--navy);
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .fp-table-count {
      font-size: 10px;
      color: var(--text-light);
      margin-top: 2px;
      letter-spacing: 0.05em;
    }
    .fp-table-names {
      font-size: 9px;
      color: var(--text-light);
      margin-top: 4px;
      line-height: 1.5;
      text-align: center;
      letter-spacing: 0.02em;
    }
    .fp-table-main .fp-table-names {
      color: rgba(255,255,255,0.7);
    }
    .fp-table:hover .fp-table-names {
      color: rgba(255,255,255,0.8);
    }

    .fp-row {
      display: grid;
      gap: 6px;
      margin-bottom: 6px;
      width: 100%;
    }
    .fp-row-4 { grid-template-columns: repeat(4, 1fr); }
    .fp-row-3 { grid-template-columns: repeat(3, 1fr); }
    .fp-row-2-spread {
      display: flex;
      justify-content: space-between;
      gap: 6px;
    }
    .fp-row-2-spread .fp-table {
      flex: 0 0 auto;
      width: 38%;
    }
    .fp-row-2-spread .fp-spacer {
      flex: 1;
    }

    @media (max-width: 480px) {
      .fp-row-4 { grid-template-columns: repeat(2, 1fr); }
      .fp-table { padding: 8px 6px; min-width: 0; }
      .fp-table-num { font-size: 13px; }
      .fp-table-names { font-size: 8px; }
      .fp-row-2-spread .fp-table { width: 40%; }
    }

    /* Arrow to tables */
    .fp-arrow {
      text-align: center;
      color: var(--gold-light);
      font-size: 18px;
      line-height: 1;
      margin: 6px 0;
    }

    /* ── Table cards grid ── */
    .tables-section {
      animation: fadeUp 0.7s 0.6s ease both;
    }

    .tables-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .table-card {
      background: var(--white);
      border: 1px solid var(--ivory-dark);
      box-shadow: var(--shadow);
      transition: box-shadow 0.3s ease, transform 0.3s ease, border-color 0.3s ease;
      padding: 24px;
      scroll-margin-top: 80px;
    }
    .table-card:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-2px);
    }

    .table-card-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .table-card-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 500;
      color: var(--navy);
      letter-spacing: 0.05em;
    }

    .table-card-count {
      font-size: 11px;
      color: var(--text-light);
      letter-spacing: 0.05em;
    }

    .table-card-group {
      font-size: 11px;
      color: var(--gold-dark);
      letter-spacing: 0.08em;
      margin-bottom: 16px;
    }

    .table-card-main {
      border-color: var(--navy);
      background: linear-gradient(135deg, #f8faff 0%, var(--white) 100%);
    }
    .table-card-main .table-card-num {
      color: var(--navy);
    }

    /* Guest list inside card */
    .guest-list {
      list-style: none;
    }

    .actions { display: none; }

    /* ── Hidden/dimmed states ── */
    .table-card.dimmed {
      opacity: 0.35;
      transform: none !important;
    }
    .table-card.dimmed:hover {
      opacity: 0.45;
      box-shadow: var(--shadow);
    }
    .guest-item.dimmed-guest {
      opacity: 0.3;
    }

    /* ── Footer ── */
    .page-footer {
      text-align: center;
      padding: 24px;
      font-size: 11px;
      color: var(--text-light);
      opacity: 0.6;
      letter-spacing: 0.08em;
      border-top: 1px solid rgba(201,169,110,0.15);
    }

  </style>
</head>
<body>

  <!-- Hero -->
  <header class="hero">
    <p class="hero-eyebrow">Seating Chart &nbsp;·&nbsp; 席次表</p>
    <h1 class="hero-names">
      髙橋 慶太<span class="hero-amp"> &amp; </span>菊地 晴香
    </h1>
    <div class="divider hero-divider">
      <span class="divider-diamond">◆</span>
    </div>
    <p class="hero-meta">2026年4月26日（日）&nbsp; 挙式 10:30 &nbsp;|&nbsp; 披露宴 11:15</p>
    <p class="hero-venue">カトルセゾンガーデン（さいたま）</p>
  </header>

  <!-- Sticky Search -->
  <div class="search-sticky" id="searchBar">
    <div class="search-inner">
      <input
        type="search"
        id="searchInput"
        class="search-input"
        placeholder="お名前で席を検索（漢字・ひらがな）"
        autocomplete="off"
      />
      <button class="search-clear" id="clearBtn" onclick="clearSearch()">✕</button>
    </div>
    <p class="search-result-info" id="resultInfo"></p>
  </div>

  <!-- Main -->
  <main class="main-content">

    <!-- Actions -->
    <div class="actions">
      <a href="print.html" target="_blank" class="btn-print">
        🖨 印刷用ページを開く
      </a>
    </div>

    <!-- Floor Plan -->
    <section class="floor-plan-section">
      <h2 class="section-title">会場テーブル配置図</h2>
      <div class="floor-plan-card">
        <div class="floor-plan">

          <!-- Rendered by JS -->
          <div id="fpStage" style="display:flex;align-items:center;justify-content:center;gap:16px;">
            <span class="fp-stage-label">ステージ / 演台</span>
            <span style="font-size:10px;color:var(--text-light);letter-spacing:0.08em;">敬称略</span>
          </div>
          <div id="fpMain" class="fp-main-row"></div>
          <div id="fpRow1" class="fp-row fp-row-4"></div>
          <div id="fpRow2" class="fp-row fp-row-3"></div>
          <div id="fpRow3" class="fp-row-2-spread"></div>

        </div>
      </div>
    </section>

    <!-- Table Cards -->
    <section class="tables-section">
      <h2 class="section-title">テーブル一覧</h2>
      <div class="tables-grid" id="tablesGrid">
        <!-- Rendered by JS -->
      </div>
    </section>

  </main>

  <footer class="page-footer">
    髙橋慶太 &amp; 菊地晴香 &nbsp;·&nbsp; 2026.04.26 &nbsp;·&nbsp; カトルセゾンガーデン
  </footer>

  <script src="data.js"></script>
  <script>
    // Auth check
    if (sessionStorage.getItem('weddingAuth') !== 'ok') {
      window.location.replace('index.html');
    }

    // ── Render table cards ──
    const grid = document.getElementById('tablesGrid');

    TABLES.forEach((table, i) => {
      const card = document.createElement('div');
      card.className = 'table-card' + (table.id === 'main' ? ' table-card-main' : '');
      card.id = 'table-' + table.id;
      card.style.animationDelay = (0.05 * i) + 's';

      const guestsHtml = table.guests.map(g => `
        <li class="guest-item" data-name="${g.name}" data-kana="${g.kana}">
          <div>
            <div class="guest-name">${g.name}${g.noSama ? '' : ' <span style="font-size:11px;color:var(--text-light);font-weight:300;">様</span>'}</div>
            <div class="guest-kana">${g.kana}</div>
          </div>
          <span class="guest-relation">${g.relation}</span>
        </li>
      `).join('');

      card.innerHTML = `
        <div class="table-card-header">
          <span class="table-card-num">${table.label}</span>
          <span class="table-card-count">${table.guests.length}名</span>
        </div>
        ${table.group ? `<div class="table-card-group">${table.group}</div>` : '<div style="margin-bottom:16px;"></div>'}
        <div class="divider" style="margin:0 0 12px;"><span class="divider-diamond" style="font-size:8px;">◆</span></div>
        <ul class="guest-list">${guestsHtml}</ul>
      `;
      grid.appendChild(card);
    });

    // ── Search ──
    const searchInput = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearBtn');
    const resultInfo = document.getElementById('resultInfo');

    let scrollTimeout = null;

    searchInput.addEventListener('input', doSearch);

    function doSearch() {
      const query = searchInput.value.trim();
      clearBtn.style.display = query ? 'block' : 'none';

      if (!query) {
        resetSearch();
        return;
      }

      const allCards = document.querySelectorAll('.table-card');
      const allGuests = document.querySelectorAll('.guest-item');
      let matchCount = 0;
      let firstMatch = null;

      allCards.forEach(c => c.classList.remove('dimmed', 'highlight-table'));
      allGuests.forEach(g => g.classList.remove('highlight-guest', 'dimmed-guest'));

      allGuests.forEach(g => {
        const matched = g.getAttribute('data-name').includes(query) ||
                        g.getAttribute('data-kana').includes(query);
        if (matched) {
          g.classList.add('highlight-guest');
          matchCount++;
          if (!firstMatch) firstMatch = g;
        } else {
          g.classList.add('dimmed-guest');
        }
      });

      allCards.forEach(card => {
        if (card.querySelector('.highlight-guest')) {
          card.classList.add('highlight-table');
        } else {
          card.classList.add('dimmed');
        }
      });

      if (matchCount === 0) {
        resultInfo.textContent = '該当するゲストが見つかりませんでした';
        resultInfo.style.color = '#C0392B';
      } else {
        resultInfo.textContent = `${matchCount}名見つかりました`;
        resultInfo.style.color = 'var(--gold-dark)';
        if (firstMatch) {
          const card = firstMatch.closest('.table-card');
          if (card) {
            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() =>
              card.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
          }
        }
      }
    }

    function clearSearch() {
      searchInput.value = '';
      clearBtn.style.display = 'none';
      resetSearch();
      searchInput.focus();
    }

    function resetSearch() {
      document.querySelectorAll('.table-card').forEach(c =>
        c.classList.remove('dimmed', 'highlight-table'));
      document.querySelectorAll('.guest-item').forEach(g =>
        g.classList.remove('highlight-guest', 'dimmed-guest'));
      resultInfo.textContent = '';
    }

    // ── Floor plan render ──
    (function renderFloorPlan() {
      const fpRowMap = {
        main: 'fpMain',
        '03': 'fpRow1', '04': 'fpRow1', '05': 'fpRow1', '06': 'fpRow1',
        '08': 'fpRow2', '09': 'fpRow2', '10': 'fpRow2',
        '12': 'fpRow3', '15': 'fpRow3',
      };

      const rowEls = {};
      Object.keys(fpRowMap).forEach(id => {
        rowEls[fpRowMap[id]] = document.getElementById(fpRowMap[id]);
      });

      function getNames(table) {
        const parts = table.guests.map(g => g.name.split(/[\u3000 ]/));
        const surnames = parts.map(p => p[0]);
        const unique = [...new Set(surnames)];
        if (unique.length === 1) {
          return parts.map(p => p[1] || p[0]);
        }
        return surnames;
      }

      TABLES.forEach(table => {
        const rowId = fpRowMap[table.id];
        if (!rowId) return;
        const rowEl = rowEls[rowId];
        const isMain = table.id === 'main';
        const names = getNames(table);
        const nameLines = [];
        for (let i = 0; i < names.length; i += 2) {
          nameLines.push(names.slice(i, i + 2).join('・'));
        }

        const div = document.createElement('div');
        div.className = 'fp-table' + (isMain ? ' fp-table-main' : '');
        div.title = table.label;
        div.onclick = () => scrollToTable(table.id);
        div.innerHTML = `
          <span class="fp-table-num">${isMain ? 'メイン' : table.id}</span>
          <span class="fp-table-count">${table.guests.length}名</span>
          <span class="fp-table-names">${nameLines.join('<br>')}</span>
        `;
        if (table.id === '15') {
          rowEl.appendChild(Object.assign(document.createElement('div'), { className: 'fp-spacer' }));
        }
        rowEl.appendChild(div);
      });
    })();

    // ── Floor plan scroll ──
    function scrollToTable(id) {
      const target = document.getElementById('table-' + id);
      if (target) {
        target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        target.classList.add('highlight-table');
        setTimeout(() => target.classList.remove('highlight-table'), 2000);
      }
    }
  </script>
</body>
</html>
